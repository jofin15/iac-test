name: Terraform Deployment with Vault + Checkov

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  security-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov scan
        run: |
          checkov -d terraform --framework terraform \
            --skip-check CKV_GCP_62,CKV_GCP_78 \
            --soft-fail-on MEDIUM
        continue-on-error: false

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4

      - name: Get GCP token from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://34.173.6.234:8200
          role: gh-actions-role
          method: jwt
          jwtGithubAudience: https://github.com/jofin15
          secrets: |
            gcp/static-account/terraform-account/token token | GOOGLE_OAUTH_ACCESS_TOKEN

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
