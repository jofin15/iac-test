name: Terraform Deployment with Vault + Checkov

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  security-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov
        run: checkov -d terraform --framework terraform

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: security-scan
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - name: Get GCP token from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://34.44.205.68:8200
          role: gh-actions-role
          method: jwt
          jwtGithubAudience: https://github.com/jofin15
          secrets: |
            gcp/static-account/terraform-account/token token | GOOGLE_OAUTH_ACCESS_TOKEN
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: terraform init
      - run: terraform plan
      - run: terraform apply -auto-approve
